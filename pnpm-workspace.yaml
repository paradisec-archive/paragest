# Supply chain security
# https://pnpm.io/supply-chain-security
minimumReleaseAge: 4320 # 3 days, tighter than v11 default of 1440 (1 day)
patchedDependencies:
  rtf-parser: patches/rtf-parser.patch
allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  esbuild: true
  oxc-resolver: true
  unrs-resolver: true
